<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ post.title }}</title>

<style>
body {
    font-family: Georgia, serif;
    background: #f7f4ee;
    margin: 0;
    padding: 40px;
    color: #0f1a14;
}

.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 40px;
    border-left: 5px solid #006d64;
}

h1 {
    font-size: 2.2rem;
}

.meta {
    font-size: 0.85rem;
    color: #6b7068;
    margin-bottom: 30px;
}

.content {
    line-height: 1.8;
    font-size: 1.05rem;
    white-space: pre-wrap;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    color: #006d64;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">

<a class="back" href="/posts">← Back to Blog</a>

<h1>{{ post.title }}</h1>

<div class="meta">
    By Unknown Author
</div>

<div class="content">
    {{ post.content }}
</div>

</div>

</body>
</html>
