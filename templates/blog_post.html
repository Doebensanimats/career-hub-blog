{% extends "base.html" %}

{% block content %}

<div class="container">

<a class="back" href="{{ url_for('blog.blog_list') }}">← Back to Blog</a>

<h1>{{ post.title }}</h1>

<div class="meta">
    By {{ post.author if post.author else "Admin" }} • 
    {{ post.date.strftime('%B %d, %Y') }}
</div>

<div class="content">
    {{ post.content }}
</div>

</div>

<style>
.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 40px;
    border-left: 5px solid #006d64;
}

h1 {
    font-size: 2.2rem;
}

.meta {
    font-size: 0.85rem;
    color: #6b7068;
    margin-bottom: 30px;
}

.content {
    line-height: 1.8;
    font-size: 1.05rem;
    white-space: pre-wrap;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    color: #006d64;
    text-decoration: none;
    font-weight: bold;
}
</style>

{% endblock %}
