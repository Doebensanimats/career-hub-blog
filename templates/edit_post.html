{% extends "base.html" %}

{% block content %}

<style>
.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 30px;
    border-left: 5px solid #006d64;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    font-family: inherit;
    border: 1px solid #ccc;
}

button {
    background: #006d64;
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
}
</style>

<div class="container">

<h1>Edit Post</h1>

<form method="POST" action="{{ url_for('blog.edit_post', id=post.id) }}">

    <!-- Title -->
    <input type="text" name="title" value="{{ post.title }}" required>

    <!-- Author (ADD IT HERE) -->
    <input type="text" name="author" value="{{ post.author }}" placeholder="Author">

    <!-- Content -->
    <textarea name="content" rows="10" required>{{ post.content }}</textarea>

    <button type="submit">Update Post</button>

</form>

<a href="{{ url_for('blog.blog_list') }}">← Back to Blog</a>

</div>

{% endblock %}
