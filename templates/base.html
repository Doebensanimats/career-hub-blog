<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Career Hub{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

{% block head %}{% endblock %}
</head>
<body>

<div class="nav-links">
  <a href="{{ url_for('index') }}"
     class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
     home
  </a>

  {% for p in get_pages() %}
    <a href="{{ url_for('page', slug=p.slug) }}"
       class="nav-link
       {% if request.endpoint == 'page'
             and request.view_args
             and request.view_args.slug == p.slug %}
             active
       {% endif %}">
       {{ p.title | lower }}
    </a>
  {% endfor %}
</div>

<main class="main">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <span>career hub</span>
  <span class="footer-sep">·</span>
  <span>built for the job hunt</span>
</footer>

</body>
</html>
