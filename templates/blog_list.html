{% extends "base.html" %}

{% block content %}

<style>
.container {
    max-width: 800px;
    margin: auto;
}

.post-card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-left: 5px solid #006d64;
}

.post-title {
    font-size: 1.4rem;
}

.post-meta {
    font-size: 0.8rem;
    color: #6b7068;
}
</style>

<div class="container">

<h1>📰 My Blog</h1>

{% for post in posts %}
<div class="post-card">

    <h2 class="post-title">{{ post.title }}</h2>

    <div class="post-meta">
        {{ post.date }} • {{ post.author }}
    </div>

    <p>{{ post.content[:150] }}...</p>

    <a href="{{ url_for('blog.blog_post', id=post.id) }}">Read</a> |
    <a href="{{ url_for('blog.edit_post', id=post.id) }}">Edit</a> |

    <!-- ✅ SAFE DELETE -->
    <form method="POST"
          action="{{ url_for('blog.delete_post', id=post.id) }}"
          style="display:inline;">

        <button type="submit"
                onclick="return confirm('Delete this post?')"
                style="background:none;border:none;color:#006d64;cursor:pointer;font-weight:bold;">
            Delete
        </button>

    </form>

</div>
{% endfor %}

</div>

{% endblock %}
