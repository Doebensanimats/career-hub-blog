<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog</title>

<style>
body {
    font-family: Georgia, serif;
    background: #f7f4ee;
    margin: 0;
    padding: 40px;
    color: #0f1a14;
}

.container {
    max-width: 800px;
    margin: auto;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 30px;
    border-bottom: 2px solid #c8c4b8;
    padding-bottom: 10px;
}

.post-card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-left: 5px solid #006d64;
    transition: 0.2s ease;
}

.post-card:hover {
    transform: translateY(-2px);
}

.post-title {
    font-size: 1.4rem;
    margin: 0;
}

.post-meta {
    font-size: 0.8rem;
    color: #6b7068;
    margin-bottom: 10px;
}

a {
    text-decoration: none;
    color: #006d64;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">

<h1>📰 My Blog</h1>

{% for post in posts %}
<div class="post-card">

    <h2 class="post-title">{{ post.title }}</h2>

    <div class="post-meta">
        By Unknown Author
    </div>

    <p>{{ post.content[:150] }}...</p>

    <a href="/post/{{ loop.index0 }}">Read more →</a>

</div>
{% endfor %}

</div>

</body>
</html>
